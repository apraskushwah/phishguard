<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      min-height: 220px;
      background: #050a14;
      color: #e2e8f0;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* BG layers */
    .bg-aurora {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 90% 60% at 10% 0%, rgba(0,150,255,0.09) 0%, transparent 55%),
        radial-gradient(ellipse 70% 80% at 90% 100%, rgba(0,255,160,0.06) 0%, transparent 55%);
    }
    .bg-grid {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(0,200,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,200,255,0.025) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: radial-gradient(ellipse at center, black 20%, transparent 80%);
    }

    .content { position: relative; z-index: 1; padding: 16px; }

    /* HEADER */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .logo {
      font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800;
      background: linear-gradient(135deg, #00c8ff, #00ffb4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; letter-spacing: -0.3px;
    }
    .status-badge {
      display: flex; align-items: center; gap: 6px;
      background: rgba(0,200,255,0.05); border: 1px solid rgba(0,200,255,0.12);
      border-radius: 999px; padding: 4px 10px;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #00ffb4; box-shadow: 0 0 8px #00ffb4;
      animation: pulse 2s infinite;
    }
    .status-text { font-size: 9px; color: rgba(0,200,255,0.6); letter-spacing: 2px; font-weight: 600; }

    /* URL BOX */
    .url-box {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px; padding: 10px 12px; margin-bottom: 12px;
      position: relative; overflow: hidden;
    }
    .url-box::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,200,255,0.25), transparent);
    }
    .url-label { font-size: 9px; color: rgba(255,255,255,0.22); letter-spacing: 2.5px; font-weight: 600; margin-bottom: 5px; }
    .url-text {
      font-family: 'DM Mono', monospace; font-size: 10.5px;
      color: rgba(0,200,255,0.65); white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }

    /* SCAN BUTTON */
    .scan-btn {
      width: 100%; height: 44px;
      background: linear-gradient(135deg, #00c8ff, #00ffb4);
      color: #030d18; border: none; border-radius: 12px;
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.3s cubic-bezier(0.23,1,0.32,1);
      margin-bottom: 12px; letter-spacing: 0.3px;
      box-shadow: 0 4px 20px rgba(0,200,255,0.25);
      position: relative; overflow: hidden;
    }
    .scan-btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
      opacity: 0; transition: opacity 0.3s;
    }
    .scan-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,200,255,0.4); }
    .scan-btn:hover::before { opacity: 1; }
    .scan-btn:active { transform: translateY(0); }
    .scan-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* LOADER */
    .loader { text-align: center; padding: 20px; display: none; }
    .spinner-wrap { position: relative; width: 44px; height: 44px; margin: 0 auto 12px; }
    .spinner {
      width: 44px; height: 44px;
      border: 2px solid rgba(0,200,255,0.08);
      border-top: 2px solid #00c8ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .spinner-dot {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 8px; height: 8px; background: #00ffb4;
      border-radius: 50%; box-shadow: 0 0 10px #00ffb4;
      animation: pulse 2s infinite;
    }
    .loader-text { font-size: 9px; color: rgba(0,200,255,0.5); letter-spacing: 2.5px; font-weight: 600; animation: pulse 2s infinite; }

    /* RESULT */
    .result { display: none; animation: fadeIn 0.4s cubic-bezier(0.23,1,0.32,1); }

    .result-card {
      border-radius: 16px; padding: 14px; margin-bottom: 10px;
      position: relative; overflow: hidden;
    }
    .result-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, currentColor, transparent);
      opacity: 0.3;
    }
    .result-inner { display: flex; align-items: center; gap: 14px; }

    /* SCORE RING */
    .score-svg { flex-shrink: 0; filter: drop-shadow(0 0 8px currentColor); }
    .score-ring { transition: stroke-dashoffset 1.5s cubic-bezier(0.23,1,0.32,1); }

    .verdict-section { flex: 1; }
    .verdict-label { font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: 2.5px; font-weight: 600; margin-bottom: 5px; }
    .verdict-text { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: 0.5px; line-height: 1; margin-bottom: 8px; }
    .verdict-chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .chip {
      font-family: 'DM Mono', monospace; font-size: 9px;
      color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07); padding: 3px 8px; border-radius: 6px;
    }

    /* FLAGS */
    .flags-title { font-size: 9px; color: rgba(255,255,255,0.22); letter-spacing: 2.5px; font-weight: 600; margin-bottom: 8px; padding-top: 2px; }
    .flag-item {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
      animation: fadeIn 0.3s ease;
    }
    .flag-item:last-child { border-bottom: none; }
    .flag-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .flag-content { flex: 1; }
    .flag-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.82); }
    .flag-detail { font-size: 10px; color: rgba(255,255,255,0.28); margin-top: 1px; font-family: 'DM Sans'; font-weight: 300; }
    .flag-badge {
      font-size: 8px; padding: 2px 8px; border-radius: 6px;
      font-weight: 700; letter-spacing: 0.8px; flex-shrink: 0;
      font-family: 'DM Sans';
    }

    /* OPEN BTN */
    .open-btn {
      width: 100%; height: 36px;
      background: rgba(0,200,255,0.05); border: 1px solid rgba(0,200,255,0.14);
      color: rgba(0,200,255,0.55); border-radius: 10px;
      font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
      letter-spacing: 0.5px; cursor: pointer; margin-top: 10px;
      transition: all 0.25s cubic-bezier(0.23,1,0.32,1);
    }
    .open-btn:hover { background: rgba(0,200,255,0.1); border-color: rgba(0,200,255,0.28); color: #00c8ff; transform: translateY(-1px); }

    /* ANIMATIONS */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    ::-webkit-scrollbar { width: 2px; }
    ::-webkit-scrollbar-thumb { background: rgba(0,200,255,0.15); border-radius: 2px; }
  </style>
</head>
<body>
  <div class="bg-aurora"></div>
  <div class="bg-grid"></div>

  <div class="content">

    <!-- HEADER -->
    <div class="header">
      <div class="logo">🛡️ PhishGuard</div>
      <div class="status-badge">
        <div class="status-dot"></div>
        <span class="status-text">ONLINE</span>
      </div>
    </div>

    <!-- CURRENT URL -->
    <div class="url-box">
      <div class="url-label">CURRENT PAGE</div>
      <div class="url-text" id="currentUrl">Detecting...</div>
    </div>

    <!-- SCAN BUTTON -->
    <button class="scan-btn" id="scanBtn">⚡ Scan This Page</button>

    <!-- LOADER -->
    <div class="loader" id="loader">
      <div class="spinner-wrap">
        <div class="spinner"></div>
        <div class="spinner-dot"></div>
      </div>
      <div class="loader-text">ANALYZING THREAT VECTORS</div>
    </div>

    <!-- RESULT -->
    <div class="result" id="result"></div>

    <!-- OPEN APP -->
    <button class="open-btn" id="openApp">↗ Open Full PhishGuard App</button>

  </div>

  <script src="popup.js"></script>
</body>
</html>
